<script src="dados.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // ---- CONTROLE DO MENU MOBILE ----
            const menuBtn = document.getElementById("menu-toggle");
            const sidebar = document.querySelector(".sidebar");

            if (menuBtn && sidebar) {
                menuBtn.addEventListener("click", function() {
                    sidebar.classList.toggle("active");
                    if (sidebar.classList.contains("active")) {
                        menuBtn.innerHTML = "✕ Fechar Menu";
                    } else {
                        menuBtn.innerHTML = "☰ Menu Wiki";
                    }
                });
            }

            // ---- BUSCA ESTILO WIKI ATUALIZADA ----
            const searchInput = document.getElementById("wiki-search");
            const dropdown = document.getElementById("search-results");

            if (searchInput && dropdown) {
                searchInput.addEventListener("input", function() {
                    const query = this.value.toLowerCase().trim();
                    dropdown.innerHTML = "";

                    if (!query) {
                        dropdown.style.display = "none";
                        return;
                    }

                    // searchData vem direto do arquivo dados.js agora!
                    const results = searchData.filter(item =>
                        item.title.toLowerCase().includes(query)
                    );

                    if (results.length === 0) {
                        dropdown.innerHTML = `
                            <div style="padding:12px;color:#ff7b00;">
                                ⚠️ Nenhum resultado encontrado
                            </div>`;
                        dropdown.style.display = "block";
                        return;
                    }

                    results.forEach(item => {
                        const result = document.createElement("a");
                        result.className = "search-item";
                        result.href = item.url;

                        // MUDANÇA AQUI: Agora renderiza a imagem real do seu projeto!
                        // Coloquei um 'onerror' para caso a imagem suma, ele carregar a logo ou uma imagem padrão.
                        result.innerHTML = `
                            <div class="search-item-icon">
                                <img src="${item.icon}" alt="${item.title}" style="width: 100%; height: 100%; object-fit: contain;" onerror="this.src='imagens/0-banners/logo.jpg'">
                            </div>
                            <div>
                                <strong style="color: #d7d52c;">${item.title}</strong><br>
                                <small style="color: #aaa;">${item.category}</small>
                            </div>
                        `;
                        dropdown.appendChild(result);
                    });

                    dropdown.style.display = "block";
                });

                document.addEventListener("click", function(e) {
                    if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
                        dropdown.style.display = "none";
                    }
                });
            }
        });
    </script>
